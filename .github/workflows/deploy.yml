name: Deploy a cPanel (FTPS)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Desplegar cambios al hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Instalar lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Desplegar archivos cambiados vía FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          EXCLUDE_RE='^(\.github/|\.git|\.gitignore$|README\.md$|wp-config\.php$|\.htaccess|wp-content/mu-plugins/|wp-content/uploads/|wp-content/cache/|wp-content/endurance-page-cache/|wp-content/upgrade|\.ftp-deploy-sync-state)|(\.DS_Store$)|(temp-write-test-)'
          BASE=/public_html
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD | { grep -Ev "$EXCLUDE_RE" || true; })
            DELETED=$(git diff --name-only --diff-filter=D HEAD~1 HEAD | { grep -Ev "$EXCLUDE_RE" || true; })
          else
            CHANGED=$(git ls-files | { grep -Ev "$EXCLUDE_RE" || true; })
            DELETED=""
          fi
          echo "== a subir =="; echo "$CHANGED" | sed '/^$/d' | sed 's/^/  + /'
          echo "== a borrar =="; echo "$DELETED" | sed '/^$/d' | sed 's/^/  - /'
          if [ -z "$(printf '%s%s' "$CHANGED" "$DELETED" | tr -d '[:space:]')" ]; then
            echo "Nada que desplegar (solo cambios excluidos). OK."
            exit 0
          fi
          SCRIPT=$(mktemp)
          {
            echo "set ftp:ssl-force true"
            echo "set ftp:ssl-protect-data true"
            echo "set ssl:verify-certificate no"
            echo "set net:max-retries 5"
            echo "set net:persist-retries 5"
            echo "set net:reconnect-interval-base 5"
            echo "set net:timeout 25"
            printf 'open -u "%s","%s" "%s"\n' "$FTP_USERNAME" "$FTP_PASSWORD" "$FTP_SERVER"
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              d=$(dirname "$f")
              if [ "$d" = "." ]; then
                printf 'put -O "%s" "%s"\n' "$BASE" "$f"
              else
                printf 'mkdir -p "%s/%s"\n' "$BASE" "$d"
                printf 'put -O "%s/%s" "%s"\n' "$BASE" "$d" "$f"
              fi
            done <<< "$CHANGED"
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              printf 'rm -f "%s/%s"\n' "$BASE" "$f"
            done <<< "$DELETED"
            echo "bye"
          } > "$SCRIPT"
          lftp -f "$SCRIPT"
          echo "Deploy incremental completado."
