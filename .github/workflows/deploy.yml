name: Deploy a cPanel (FTPS)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Sincronizar código al hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Deploy vía FTPS (lftp mirror, resiliente e incremental)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<'EOF'
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set net:max-retries 5
          set net:persist-retries 10
          set net:reconnect-interval-base 5
          set net:timeout 25
          set mirror:parallel-transfer-count 1
          mirror -R --ignore-time --no-perms --verbose \
            -x '^\.git' \
            -x '^README\.md$' \
            -x '^wp-config\.php$' \
            -x '^\.htaccess' \
            -x '^wp-content/mu-plugins/' \
            -x '^wp-content/uploads/' \
            -x '^wp-content/cache/' \
            -x '^wp-content/endurance-page-cache/' \
            -x '^wp-content/upgrade' \
            -x 'temp-write-test-' \
            -x '^\.ftp-deploy-sync-state\.json$' \
            -x '\.DS_Store$' \
            ./ /public_html/
          bye
          EOF
